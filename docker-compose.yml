version: '3.8'

services:
  web:
    build: .
    command: waitress-serve --port=8000 --call app:crear_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      FLASK_APP: main.py
      FLASK_DEBUG: 1
      DATABASE_URL: mysql+mysqlconnector://root:Actas2026@db:3306/secure_deletion_records
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: secure_deletion_records
      MYSQL_ROOT_PASSWORD: "Actas2026"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: