<!DOCTYPE html>
<html lang="es" data-tema="0">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Borrado Seguro | Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/base.css') }}">
    {% endblock %}
</head>
<body>
    <div class="d-flex min-vh-100">
        
        {% if current_user.is_authenticated %}
            {% include 'partials/_sidebar_admin.html' %}
        {% endif %}

        <main class="flex-grow-1 {% if current_user.is_authenticated %}p-4{% endif %}">
            {% block content %}{% endblock %}
        </main>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
